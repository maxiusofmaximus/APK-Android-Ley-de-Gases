<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards Química</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; width: 100%; max-width: 1000px; }
        .card { height: 150px; perspective: 1000px; cursor: pointer; }
        .inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-radius: 10px; }
        .card.flip .inner { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; padding: 15px; box-sizing: border-box; border-radius: 10px; font-weight: bold; }
        .front { background: white; color: #2c3e50; border: 2px solid #3498db; }
        .back { background: #3498db; color: white; transform: rotateY(180deg); }
    </style>
</head>
<body>
    <h1>📚 Mis Flashcards de Química</h1>
    <div class="grid" id="container"></div>
    <script>
        const data = [
            {q: "1 mmHg a torr", a: "1 torr"},
            {q: "1 atm en mmHg", a: "760 mmHg"},
            {q: "1 Pa en atm", a: "9.86 × 10⁻⁶ atm"},
            {q: "1 atm en Pa", a: "101,325 Pa"},
            {q: "Temperatura Normal", a: "273.15 K"},
            {q: "Presión Normal", a: "1 atm"},
            {q: "Volumen normal", a: "22.4 L"},
            {q: "Número de Avogadro", a: "6.022 × 10²³"},
            {q: "Constante R", a: "0.082 L·atm/mol·K"},
            {q: "Ley de Boyle", a: "V1P1 = V2P2 (T y n constantes)"},
            {q: "Ley de Charles", a: "V1/T1 = V2/T2 (P y n constantes)"},
            {q: "Ley de Gay-Lussac", a: "P1/T1 = P2/T2 (V y n constantes)"},
            {q: "Gas Ideal", a: "PV = nRT"},
            {q: "Densidad de un gas", a: "P = dRT / M"},
            {q: "Peso Molecular", a: "PV = mRT / M"}
        ];
        const container = document.getElementById('container');
        data.forEach(item => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<div class="inner"><div class="front">${item.q}</div><div class="back">${item.a}</div></div>`;
            div.onclick = () => div.classList.toggle('flip');
            container.appendChild(div);
        });
    </script>
</body>
</html>
